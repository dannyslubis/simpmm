<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulasi Stoikiometri</title>
    <style>
        /* Pengaturan Body */
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            /* Warna latar belakang disesuaikan dengan gambar referensi Anda */
            background-color: #1a1a1a; 
        }

        /* Container Kanvas */
        #simulasi-container {
            position: relative;
            width: 512px;
            height: 288px;
            background-image: url('kanvaspmm.png');
            background-size: cover;
        }

        /* Layer Animasi */
        #layer-animasi {
            position: absolute;
            top: 0;
            left: 0;
            width: 512px;
            height: 288px;
            pointer-events: none; 
            display: none; 
        }

        /* Hitbox Tombol */
        .hitbox {
            position: absolute;
            cursor: pointer;
        }

        /* Posisi Koordinat */
        #btn-ch4 { left: 32px; top: 64px; width: 32px; height: 32px; }
        #btn-nh3 { left: 32px; top: 96px; width: 32px; height: 32px; }
        #btn-h2o { left: 32px; top: 128px; width: 32px; height: 32px; }
        #btn-hf  { left: 32px; top: 160px; width: 32px; height: 32px; }
        #btn-co2 { left: 32px; top: 192px; width: 32px; height: 32px; }

        #btn-gabung { left: 128px; top: 224px; width: 64px; height: 32px; }
        #btn-pisah  { left: 320px; top: 224px; width: 64px; height: 32px; }
    </style>
</head>
<body>

    <div id="simulasi-container">
        <img id="layer-animasi" src="" alt="Animasi Stoikiometri">

        <div id="btn-ch4" class="hitbox" onclick="pilihSenyawa('ch')" title="Pilih CH4"></div>
        <div id="btn-nh3" class="hitbox" onclick="pilihSenyawa('nh')" title="Pilih NH3"></div>
        <div id="btn-h2o" class="hitbox" onclick="pilihSenyawa('oh')" title="Pilih H2O"></div>
        <div id="btn-hf" class="hitbox" onclick="pilihSenyawa('fh')" title="Pilih HF"></div>
        <div id="btn-co2" class="hitbox" onclick="pilihSenyawa('co')" title="Pilih CO2"></div>

        <div id="btn-gabung" class="hitbox" onclick="reaksiGabung()" title="Gabungkan"></div>
        <div id="btn-pisah" class="hitbox" onclick="reaksiPisah()" title="Pisahkan"></div>
    </div>

    <script>
        // --- PRELOADER ASET ---
        // Memuat semua GIF ke memori browser saat halaman web pertama kali dibuka
        // Ini memastikan tidak ada jeda "loading" saat tombol ditekan pertama kali
        window.onload = function() {
            const listSenyawa = ['ch', 'nh', 'oh', 'fh', 'co'];
            const listTipe = ['dis.gif', 'dis1.gif', 'com.gif', 'com1.gif'];
            
            listSenyawa.forEach(senyawa => {
                listTipe.forEach(tipe => {
                    const img = new Image();
                    img.src = `pmm${senyawa}${tipe}`;
                });
            });
        };

        // --- LOGIKA SIMULASI ---
        let senyawaAktif = ''; 
        let timerAnimasi; 
        const layerAnimasi = document.getElementById('layer-animasi');

        const durasiAnimasi = {
            'co': 3300, 
            'fh': 1800, 
            'ch': 3300, 
            'nh': 2400, 
            'oh': 2400  
        };

        function tampilkanGif(namaFile) {
            layerAnimasi.src = namaFile + "?t=" + new Date().getTime();
        }

        function pilihSenyawa(kodeSenyawa) {
            senyawaAktif = kodeSenyawa;
            clearTimeout(timerAnimasi); 
            layerAnimasi.style.display = 'block'; 
            
            layerAnimasi.src = `pmm${kodeSenyawa}dis.gif`;
        }

        function eksekusiReaksi(jenis) { 
            if (senyawaAktif === '') return; 

            clearTimeout(timerAnimasi);
            tampilkanGif(`pmm${senyawaAktif}${jenis}1.gif`);

            // Memotong jeda 150ms agar lebih akurat sebelum pergantian
            let waktuPotong = durasiAnimasi[senyawaAktif] - 150; 

            timerAnimasi = setTimeout(() => {
                layerAnimasi.src = `pmm${senyawaAktif}${jenis}.gif`;
            }, waktuPotong);
        }

        function reaksiGabung() {
            eksekusiReaksi('com');
        }

        function reaksiPisah() {
            eksekusiReaksi('dis');
        }
    </script>

</body>
</html>
