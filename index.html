<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulasi Stoikiometri</title>
    <style>
        /* Mengatur penengah tampilan agar rapi saat disematkan */
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #000000; /* Warna latar belakang dikembalikan ke hitam */
        }

        /* Container utama simulasi dengan ukuran presisi 512x288 px */
        #simulasi-container {
            position: relative;
            width: 512px;
            height: 288px;
            background-image: url('kanvaspmm.png');
            background-size: cover;
        }

        /* Layer untuk menampilkan GIF */
        #layer-animasi {
            position: absolute;
            top: 0;
            left: 0;
            width: 512px;
            height: 288px;
            pointer-events: none; /* Agar klik diteruskan ke tombol di bawahnya */
            display: none; /* Disembunyikan sebelum ada senyawa yang dipilih */
        }

        /* Tombol transparan / Hitbox */
        .hitbox {
            position: absolute;
            cursor: pointer;
        }

        /* Mengatur posisi tombol berdasarkan grid 32x32px */
        #btn-ch4 { left: 32px; top: 64px; width: 32px; height: 32px; } /* Koordinat b3 */
        #btn-nh3 { left: 32px; top: 96px; width: 32px; height: 32px; } /* Koordinat b4 */
        #btn-h2o { left: 32px; top: 128px; width: 32px; height: 32px; } /* Koordinat b5 */
        #btn-hf  { left: 32px; top: 160px; width: 32px; height: 32px; } /* Koordinat b6 */
        #btn-co2 { left: 32px; top: 192px; width: 32px; height: 32px; } /* Koordinat b7 */

        #btn-gabung { left: 128px; top: 224px; width: 64px; height: 32px; } /* Koordinat e8-f8 */
        #btn-pisah  { left: 320px; top: 224px; width: 64px; height: 32px; } /* Koordinat k8-l8 */
    </style>
</head>
<body>

    <div id="simulasi-container">
        <img id="layer-animasi" src="" alt="Animasi Stoikiometri">

        <div id="btn-ch4" class="hitbox" onclick="pilihSenyawa('ch')" title="Pilih CH4"></div>
        <div id="btn-nh3" class="hitbox" onclick="pilihSenyawa('nh')" title="Pilih NH3"></div>
        <div id="btn-h2o" class="hitbox" onclick="pilihSenyawa('oh')" title="Pilih H2O"></div>
        <div id="btn-hf" class="hitbox" onclick="pilihSenyawa('fh')" title="Pilih HF"></div>
        <div id="btn-co2" class="hitbox" onclick="pilihSenyawa('co')" title="Pilih CO2"></div>

        <div id="btn-gabung" class="hitbox" onclick="reaksiGabung()" title="Gabungkan"></div>
        <div id="btn-pisah" class="hitbox" onclick="reaksiPisah()" title="Pisahkan"></div>
    </div>

    <script>
        let senyawaAktif = ''; 
        let timerAnimasi; 
        const layerAnimasi = document.getElementById('layer-animasi');

        // Kamus durasi animasi transisi dalam milidetik (ms)
        // Telah dikurangi 200ms (0,2 detik) dari total asli agar transisi lebih mulus
        const durasiAnimasi = {
            'co': 3100, // Aslinya 3300
            'fh': 1600, // Aslinya 1800
            'ch': 3100, // Aslinya 3300
            'nh': 2200, // Aslinya 2400
            'oh': 2200  // Aslinya 2400
        };

        function tampilkanGif(namaFile) {
            layerAnimasi.src = namaFile + "?t=" + new Date().getTime();
        }

        function pilihSenyawa(kodeSenyawa) {
            senyawaAktif = kodeSenyawa;
            clearTimeout(timerAnimasi); 
            layerAnimasi.style.display = 'block'; 
            
            tampilkanGif(`pmm${kodeSenyawa}dis.gif`);
        }

        function reaksiGabung() {
            if (senyawaAktif === '') return; 

            clearTimeout(timerAnimasi);
            tampilkanGif(`pmm${senyawaAktif}com1.gif`);

            let waktuTunggu = durasiAnimasi[senyawaAktif];
            timerAnimasi = setTimeout(() => {
                tampilkanGif(`pmm${senyawaAktif}com.gif`);
            }, waktuTunggu);
        }

        function reaksiPisah() {
            if (senyawaAktif === '') return; 

            clearTimeout(timerAnimasi);
            tampilkanGif(`pmm${senyawaAktif}dis1.gif`);

            let waktuTunggu = durasiAnimasi[senyawaAktif];
            timerAnimasi = setTimeout(() => {
                tampilkanGif(`pmm${senyawaAktif}dis.gif`);
            }, waktuTunggu);
        }
    </script>

</body>
</html>
