<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulasi Stoikiometri</title>
    <style>
        /* Latar belakang dibuat transparan agar menyatu dengan game utama SimLab */
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: transparent; 
        }

        #simulasi-container {
            position: relative;
            width: 512px;
            height: 288px;
            background-image: url('kanvaspmm.png');
            background-size: cover;
        }

        /* Layer animasi sekarang memiliki efek transisi fade-in dan fade-out */
        #layer-animasi {
            position: absolute;
            top: 0;
            left: 0;
            width: 512px;
            height: 288px;
            pointer-events: none; 
            display: none; 
            opacity: 1;
            /* Transisi fade berdurasi 0.15 detik */
            transition: opacity 0.15s ease-in-out;
        }

        .hitbox {
            position: absolute;
            cursor: pointer;
        }

        /* Posisi tombol */
        #btn-ch4 { left: 32px; top: 64px; width: 32px; height: 32px; }
        #btn-nh3 { left: 32px; top: 96px; width: 32px; height: 32px; }
        #btn-h2o { left: 32px; top: 128px; width: 32px; height: 32px; }
        #btn-hf  { left: 32px; top: 160px; width: 32px; height: 32px; }
        #btn-co2 { left: 32px; top: 192px; width: 32px; height: 32px; }

        #btn-gabung { left: 128px; top: 224px; width: 64px; height: 32px; }
        #btn-pisah  { left: 320px; top: 224px; width: 64px; height: 32px; }
    </style>
</head>
<body>

    <div id="simulasi-container">
        <img id="layer-animasi" src="" alt="Animasi Stoikiometri">

        <div id="btn-ch4" class="hitbox" onclick="pilihSenyawa('ch')" title="Pilih CH4"></div>
        <div id="btn-nh3" class="hitbox" onclick="pilihSenyawa('nh')" title="Pilih NH3"></div>
        <div id="btn-h2o" class="hitbox" onclick="pilihSenyawa('oh')" title="Pilih H2O"></div>
        <div id="btn-hf" class="hitbox" onclick="pilihSenyawa('fh')" title="Pilih HF"></div>
        <div id="btn-co2" class="hitbox" onclick="pilihSenyawa('co')" title="Pilih CO2"></div>

        <div id="btn-gabung" class="hitbox" onclick="reaksiGabung()" title="Gabungkan"></div>
        <div id="btn-pisah" class="hitbox" onclick="reaksiPisah()" title="Pisahkan"></div>
    </div>

    <script>
        let senyawaAktif = ''; 
        let timerAnimasi; 
        let timerFade;
        const layerAnimasi = document.getElementById('layer-animasi');

        // Durasi dikembalikan ke hitungan murni (Jumlah Frame x 300ms)
        const durasiAnimasi = {
            'co': 3300, 
            'fh': 1800, 
            'ch': 3300, 
            'nh': 2400, 
            'oh': 2400  
        };

        function tampilkanGif(namaFile) {
            layerAnimasi.src = namaFile + "?t=" + new Date().getTime();
        }

        function pilihSenyawa(kodeSenyawa) {
            senyawaAktif = kodeSenyawa;
            clearTimeout(timerAnimasi); 
            clearTimeout(timerFade);
            
            // Matikan fade sementara agar tidak berkedip aneh saat ganti senyawa baru
            layerAnimasi.style.transition = 'none'; 
            layerAnimasi.style.opacity = '1';
            layerAnimasi.style.display = 'block'; 
            
            // Nyalakan kembali transisi fade untuk digunakan nanti
            setTimeout(() => {
                layerAnimasi.style.transition = 'opacity 0.15s ease-in-out';
            }, 50);
            
            tampilkanGif(`pmm${kodeSenyawa}dis.gif`);
        }

        // Fungsi gabungan untuk menyederhanakan kode
        function eksekusiReaksi(jenis) { // jenis akan diisi 'com' atau 'dis'
            if (senyawaAktif === '') return; 

            clearTimeout(timerAnimasi);
            clearTimeout(timerFade);
            
            layerAnimasi.style.opacity = '1';
            tampilkanGif(`pmm${senyawaAktif}${jenis}1.gif`); // Putar animasi transisi (...com1 atau ...dis1)

            let waktuTunggu = durasiAnimasi[senyawaAktif];
            let durasiFade = 150; // Waktu untuk memulai fade out (150 milidetik sebelum selesai)

            // 1. Memicu gambar memudar sesaat sebelum durasi asli habis
            timerFade = setTimeout(() => {
                layerAnimasi.style.opacity = '0';
            }, waktuTunggu - durasiFade);

            // 2. Mengganti gambar dan memudarkannya kembali masuk tepat di durasi asli
            timerAnimasi = setTimeout(() => {
                tampilkanGif(`pmm${senyawaAktif}${jenis}.gif`);
                layerAnimasi.style.opacity = '1';
            }, waktuTunggu);
        }

        function reaksiGabung() {
            eksekusiReaksi('com');
        }

        function reaksiPisah() {
            eksekusiReaksi('dis');
        }
    </script>

</body>
</html>
